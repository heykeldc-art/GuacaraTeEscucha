<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guacara - HDC 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-medianoche: #0D2A47;
            --naranja-vibrante: #EB7524;
            --dorado-suave: #d4af37;
            --azul-cielo-transparente: rgba(135, 206, 235, 0.4);
            --naranja-suave-transparente: rgba(235, 117, 36, 0.3);
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--azul-medianoche); }
        
        /* Estilo para el "Logo" Guacara */
        .logo-guacara {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            background: linear-gradient(to bottom, #f1d37e 0%, #d4af37 50%, #8a6e2f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
            letter-spacing: -2px;
        }

        .bg-pregunta-par { background-color: var(--azul-cielo-transparente); }
        .bg-pregunta-impar { background-color: var(--naranja-suave-transparente); }
        
        /* Botones Naranjas */
        .btn-naranja {
            background-color: var(--naranja-vibrante);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(235, 117, 36, 0.4);
        }
        .btn-naranja:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--naranja-vibrante);
        }

        .radio-btn:checked + label {
            background-color: var(--naranja-vibrante);
            color: white;
            border-color: var(--naranja-vibrante);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div id="splash" class="flex flex-col items-center justify-center text-center w-full max-w-md mx-auto">
        <h1 class="logo-guacara mb-2">Guacara</h1>
        
        <h2 class="text-2xl font-bold text-[#EB7524] mb-2 px-4 leading-tight uppercase tracking-tight">
            Transformando Silencios en Esperanzas
        </h2>
        <p class="text-sm opacity-80 mb-10 px-6 font-medium">Programa de Bienestar Socioemocional</p>
        
        <button onclick="iniciarRegistro()" class="btn-naranja w-full text-white px-10 py-4 rounded-full font-bold text-xl">
            COMENZAR
        </button>
        
        <p class="mt-12 text-xs opacity-50 font-bold uppercase tracking-widest">HDC 1991 - SISTEMA OPERATIVO</p>
    </div>

    <div id="registro" class="hidden w-full max-w-md bg-white text-[#0D2A47] rounded-3xl p-6 shadow-2xl border-t-8 border-[#EB7524]">
        <h2 class="text-2xl font-bold mb-6 text-center border-b pb-2">Registro Ciudadano</h2>
        <div class="space-y-4">
            <input type="text" id="reg-nombre" placeholder="Nombre y Apellido" class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-[#EB7524] bg-gray-50">
            <input type="text" id="reg-cedula" placeholder="Cédula de Identidad" class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-[#EB7524] bg-gray-50">
            <input type="number" id="reg-edad" placeholder="Edad" oninput="actualizarCamposCondicionales()" class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-[#EB7524] bg-gray-50">
            
            <div id="contenedor-condicional" class="w-full"></div>

            <select id="reg-territorio" onchange="cargarSectores()" class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-[#EB7524] bg-gray-50">
                <option value="">Seleccione Territorio...</option>
                <option value="ARAGÜITA">ARAGÜITA</option>
                <option value="CENTRO">CENTRO</option>
                <option value="CIUDAD ALIANZA">CIUDAD ALIANZA</option>
                <option value="SAMÁN">SAMÁN</option>
                <option value="SUR">SUR</option>
                <option value="TOCO">TOCO</option>
                <option value="VIGIRIMA">VIGIRIMA</option>
                <option value="YAGUA">YAGUA</option>
            </select>

            <select id="reg-sector" class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-[#EB7524] bg-gray-50" disabled>
                <option value="">Primero elija territorio...</option>
            </select>
        </div>
        <button onclick="empezarEncuesta()" class="btn-naranja mt-8 w-full text-white py-4 rounded-2xl font-bold text-lg">SIGUIENTE</button>
    </div>

    <div id="encuesta" class="hidden w-full max-w-lg rounded-3xl p-6 shadow-2xl text-white transition-colors duration-500">
        <span id="nro-pregunta" class="text-xs font-bold opacity-70 uppercase tracking-widest">Pregunta 1</span>
        <h3 id="texto-pregunta" class="text-xl font-bold mt-2 mb-8 min-h-[60px] leading-snug">Cargando...</h3>
        
        <div id="escala-respuestas" class="flex justify-between mb-8 px-2"></div>
        <div class="flex justify-between px-2 text-[10px] font-bold opacity-80 uppercase mb-10">
            <span>Nunca</span>
            <span id="label-siempre">Siempre</span>
        </div>

        <div id="seccion-comentario" class="hidden mb-6">
            <h4 class="font-bold mb-2 text-sm uppercase">Comentarios y derivación:</h4>
            <textarea id="comentario-final" class="w-full bg-white/20 border-2 border-white/30 rounded-2xl p-4 h-32 outline-none focus:border-[#EB7524] text-white placeholder-white/50" placeholder="Escriba aquí su observación libre..."></textarea>
        </div>

        <div class="flex gap-2">
            <button id="btn-anterior" onclick="preguntaAnterior()" class="hidden w-1/3 bg-white/10 py-3 rounded-xl font-bold hover:bg-white/20">ATRÁS</button>
            <button id="btn-siguiente" onclick="proximaPregunta()" class="btn-naranja w-full text-white py-4 rounded-xl font-bold shadow-lg uppercase tracking-wider">SIGUIENTE</button>
        </div>
    </div>

    <div id="gracias" class="hidden text-center p-8">
        <h1 class="logo-guacara text-6xl mb-6">Guacara</h1>
        <p class="text-xl italic px-4 font-bold text-[#EB7524]">"Transformando Silencios en Esperanzas"</p>
        <p class="mt-8 opacity-60 text-sm">Información procesada por HDC 1991</p>
    </div>

    <script>
        const sectoresData = {
            "ARAGÜITA": ["19 de Julio", "Aragüita Centro", "Aragüita I", "Aragüita II", "Bolívar y Martí", "Bosque de Aragüita", "Caraquita", "Ciudad de Dios", "El Toquito", "La Juventud", "La Libertad", "La Sabanita", "Las Gardenias", "Las Malvinas", "Lomas del Hipódromo", "Los Girasoles", "Los Mangos", "Los Naranjos", "Nueva Guacara", "Parque Aragüita", "Praderas de Guacara", "Residencias Aragüita", "Tacarigua I", "Tacarigua II", "Tierras Blancas", "Villa de Dios"],
            "CENTRO": ["Alí Primera", "Augusto Malavé Villalba", "Bello Monte", "Centro I", "Centro II", "Corazón de Jesús", "El Carmen", "La Coromoto", "La Esperanza", "La Florida", "La Placerita", "Las Flores", "Los Apamates", "San Rafael", "Zona Industrial"],
            "CIUDAD ALIANZA": ["1ra Etapa", "2da Etapa", "3ra Etapa", "4ta Etapa", "5ta Etapa", "Alianza Centro", "Alianza Sur", "Casas Dignas", "El Bosque", "El Parque", "Jardín Alianza", "La Floresta", "La Pradera", "Los Jarales", "Quintas de Alianza", "Valle Dorado", "Villa Alianza"],
            "SAMÁN": ["El Samán", "El Samán II", "El Samán III", "El Samán IV", "El Samán V", "El Samán VI", "Los Apamates", "Los Helechos", "Los Merecure", "Los Naranjos", "Los Olivos", "Los Pinos", "Los Rosales", "Los Sauces", "Saman Azucena", "Saman Centro", "Saman I", "Saman Sur", "Saman Te Escucha", "Valle de Saman"],
            "SUR": ["13 de Mayo", "19 de Julio Sur", "4 de Febrero", "Agua Sal", "Bolívar Sur", "Chirgua I", "Chirgua II", "El Libertador", "El Triunfo", "La Lucha", "Los Cardones", "Sueños del Comandante"],
            "TOCO": ["Altamira", "Callejón El Toco", "Callejón La Línea", "Camino Real", "Cerro El Toco", "El Cardonal", "El Esfuerzo", "El Toco Centro", "El Toco I", "El Toco II", "El Toco III", "El Toco IV", "El Toco Norte", "El Toco Sur", "La Acequia", "La Florida", "La Juventud", "La Paz", "Las Tejas", "Piedras Blancas", "Sinaí"],
            "VIGIRIMA": ["BATALLA: Bolivariano I", "BATALLA: Bolivariano II", "BATALLA: Peñita Agrícola", "BATALLA: Peñita El Viento", "BATALLA: Brisas del Mayei", "BATALLA: Cacho Mocho", "BATALLA: El Chaparral", "BATALLA: Flor de la Manga", "BATALLA: La Morita", "BATALLA: Vigirima Centro", "PETROGLIFOS: Colinas del Toco", "PETROGLIFOS: Petroglifos Ojo de Agua", "PETROGLIFOS: Tronconero", "PETROGLIFOS: Tronconero Norte", "PETROGLIFOS: Tronconero Sur", "PETROGLIFOS: Diego Ibarra", "PETROGLIFOS: La Compañía", "PETROGLIFOS: Mata Redonda", "PETROGLIFOS: Ramon Cruces", "PETROGLIFOS: Avispero Norte", "PETROGLIFOS: El Sisal", "PETROGLIFOS: La Vecindad", "PETROGLIFOS: Valle Dorado", "PETROGLIFOS: Valles de Vigirima", "PETROGLIFOS: Villas del Toco"],
            "YAGUA": ["Araguaney II A", "Araguaney II B", "Araguaney Primero", "Los Cedros", "Los Mangos", "San Esteban", "Valles de Yagua", "La Manga", "La Primavera", "Las Malvinas", "Los Almendrones", "Los Naranjos", "Maracaibero", "Quebrada Honda", "El Limon", "El Porvenir", "La Milagrosa", "Las Mandarinas", "Los Girasoles", "Los Merecures", "Saman Azucena", "Campo Amor", "El Cabrito", "El Naranjal"]
        };

        const preguntasSets = {
            jovenes_menores: ["¿Me siento triste sin saber por qué?", "¿Me enojo con facilidad?", "¿Me siento sin energía?", "¿Siento que nada me sale bien?", "¿Me siento excluido(a)?", "¿Evito hablar con mis compañeros?", "¿Me cuesta hacer amigos?", "¿Siento que no encajo?", "¿Me cuesta concentrarme?", "¿Mis notas han bajado?", "¿Me siento nervioso(a) en la escuela?", "¿En casa puedo hablar de mis problemas?", "¿Siento que mis emociones molestan?", "¿Me siento solo(a) incluso acompañado(a)?", "¿He tenido cambios en mis ganas de comer o dormir?"],
            jovenes_mayores: ["¿Tengo cambios de ánimo fuertes?", "¿Me siento desconectado(a)?", "¿Ya no disfruto actividades?", "¿Me siento abrumado(a)?", "¿Prefiero estar solo(a)?", "¿Siento que no tengo a quién acudir?", "¿Me cuesta confiar en otros?", "¿He perdido interés en mis estudios?", "¿Me cuesta concentrarme?", "¿Me siento presionado(a)?", "¿Siento que en casa no me entienden?", "¿Evito hablar de mis emociones?", "¿Me siento tenso(a) en mi hogar?", "¿Me cuesta expresar lo que siento?", "¿Me irrito con facilidad?", "¿He cambiado mis hábitos de sueño o alimentación?"],
            adulto: ["¿Presento cambios de ánimo drásticos o irritabilidad sin causa aparente?", "¿Me siento abrumado(a) por las responsabilidades diarias?", "¿He perdido el interés por actividades que antes disfrutaba?", "¿Me siento desconectado(a) de mis propias emociones o del entorno?", "¿Tiendo a aislarme y evitar el contacto con amigos o colegas?", "¿Siento que no cuento con una red de apoyo confiable en momentos críticos?", "¿Me cuesta confiar en las intenciones de los demás?", "¿Me cuesta concentrarme o tomar decisiones en mis tareas principales?", "¿Siento que mi productividad o rendimiento ha disminuido notablemente?", "¿Me siento bajo una presión constante que no logro gestionar?", "¿Siento que en mi entorno familiar no comprenden mi situación actual?", "¿Evito comunicar mis preocupaciones económicas o personales en casa?", "¿Percibo un ambiente de tensión o conflicto constante en mi hogar?", "¿Presento dificultades significativas para conciliar el sueño o cambios en mi apetito?", "¿Me cuesta controlar impulsos o reacciones de enojo?", "¿Siento una fatiga persistente o falta de energía vital?"]
        };

        let encuesta = { nombre: "", cedula: "", edad: 0, condicion: "", territorio: "", sector: "", respuestas: [], index: 0, preguntas: [] };

        const WEB_APP_URL = "PEGAR_AQUI_TU_URL_DE_APPS_SCRIPT";

        function iniciarRegistro() {
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('registro').classList.remove('hidden');
        }

        function actualizarCamposCondicionales() {
            const edad = parseInt(document.getElementById('reg-edad').value);
            const contenedor = document.getElementById('contenedor-condicional');
            if (edad >= 12 && edad <= 17) {
                contenedor.innerHTML = `<select id="reg-condicion" class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-[#EB7524] bg-gray-50 text-[#0D2A47]">
                    <option value="">¿Es estudiante?</option>
                    <option value="Estudiante">Sí, estudio</option>
                    <option value="No estudiante">No estudio</option>
                </select>`;
            } else if (edad >= 18) {
                contenedor.innerHTML = `<input type="text" id="reg-condicion" placeholder="Profesión u Oficio" class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-[#EB7524] bg-gray-50 text-[#0D2A47]">`;
            } else { contenedor.innerHTML = ""; }
        }

        function cargarSectores() {
            const terr = document.getElementById('reg-territorio').value;
            const combo = document.getElementById('reg-sector');
            combo.innerHTML = '<option value="">Seleccione Sector...</option>';
            if (sectoresData[terr]) {
                sectoresData[terr].forEach(s => combo.innerHTML += `<option value="${s}">${s}</option>`);
                combo.disabled = false;
            } else { combo.disabled = true; }
        }

        function empezarEncuesta() {
            encuesta.nombre = document.getElementById('reg-nombre').value.trim();
            encuesta.cedula = document.getElementById('reg-cedula').value.trim();
            encuesta.edad = parseInt(document.getElementById('reg-edad').value);
            encuesta.territorio = document.getElementById('reg-territorio').value;
            encuesta.sector = document.getElementById('reg-sector').value;
            encuesta.condicion = document.getElementById('reg-condicion')?.value || "";

            if (!encuesta.nombre || !encuesta.cedula || !encuesta.edad || !encuesta.sector || !encuesta.condicion) {
                return alert("Complete todos los campos del registro.");
            }

            if (encuesta.edad <= 14) encuesta.preguntas = preguntasSets.jovenes_menores;
            else if (encuesta.edad <= 17) encuesta.preguntas = preguntasSets.jovenes_mayores;
            else encuesta.preguntas = preguntasSets.adulto;

            document.getElementById('registro').classList.add('hidden');
            document.getElementById('encuesta').classList.remove('hidden');
            renderizarPregunta();
        }

        function renderizarPregunta() {
            const index = encuesta.index;
            const total = encuesta.preguntas.length;
            const maxEscala = encuesta.edad < 15 ? 4 : 5;
            const container = document.getElementById('encuesta');

            container.className = `w-full max-w-lg rounded-3xl p-6 shadow-2xl transition-all duration-500 ${(index + 1) % 2 === 0 ? 'bg-pregunta-par' : 'bg-pregunta-impar'}`;
            document.getElementById('nro-pregunta').innerText = `Pregunta ${index + 1} de ${total}`;
            document.getElementById('texto-pregunta').innerText = encuesta.preguntas[index];
            document.getElementById('label-siempre').innerText = `${maxEscala} Siempre`;

            const escalaDiv = document.getElementById('escala-respuestas');
            escalaDiv.innerHTML = '';
            for (let i = 1; i <= maxEscala; i++) {
                escalaDiv.innerHTML += `
                    <div class="flex flex-col items-center">
                        <input type="radio" name="p" id="r${i}" value="${i}" class="hidden radio-btn" ${encuesta.respuestas[index] == i ? 'checked' : ''}>
                        <label for="r${i}" class="w-12 h-12 border-2 border-white/50 rounded-full flex items-center justify-center font-bold cursor-pointer hover:bg-white/20 shadow-lg">${i}</label>
                    </div>`;
            }
            document.getElementById('btn-anterior').classList.toggle('hidden', index === 0);
            const esUltima = index === total - 1;
            document.getElementById('btn-siguiente').innerText = esUltima ? "ENVIAR" : "SIGUIENTE";
            document.getElementById('seccion-comentario').classList.toggle('hidden', !esUltima);
        }

        function proximaPregunta() {
            const seleccion = document.querySelector('input[name="p"]:checked');
            if (!seleccion) return alert("Seleccione una opción.");
            encuesta.respuestas[encuesta.index] = seleccion.value;

            if (encuesta.index < encuesta.preguntas.length - 1) {
                encuesta.index++;
                renderizarPregunta();
            } else {
                if (!document.getElementById('comentario-final').value.trim()) return alert("El comentario final es requerido.");
                enviar();
            }
        }

        function preguntaAnterior() {
            if (encuesta.index > 0) { encuesta.index--; renderizarPregunta(); }
        }

        function enviar() {
            const payload = {
                nombre: encuesta.nombre,
                cedula: encuesta.cedula,
                edad: encuesta.edad,
                condicion: encuesta.condicion,
                territorio: encuesta.territorio,
                sector: encuesta.sector,
                respuestas: encuesta.respuestas,
                comentario: document.getElementById('comentario-final').value.trim()
            };

            document.getElementById('encuesta').classList.add('hidden');
            document.getElementById('gracias').classList.remove('hidden');

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => console.log("Datos enviados a HDC 1991")).catch(err => console.error(err));
        }
    </script>
</body>
</html>
